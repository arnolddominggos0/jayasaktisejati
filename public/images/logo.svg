<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <defs>
    <!-- Gradient untuk garis atas - sesuai logo asli -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient untuk garis bawah - biru tua -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Garis lengkung atas 1 - paling tipis dan tinggi -->
  <path d="M 20,50 
           C 70,25 130,35 170,45 
           C 210,55 250,40 290,35" 
        fill="none" 
        stroke="url(#greenGrad)" 
        stroke-width="2.5" 
        stroke-linecap="round"/>
  
  <!-- Garis lengkung atas 2 -->
  <path d="M 15,70 
           C 75,48 135,58 175,68 
           C 215,78 255,58 295,55" 
        fill="none" 
        stroke="url(#tealGrad)" 
        stroke-width="3.5" 
        stroke-linecap="round"/>
  
  <!-- Garis lengkung atas 3 -->
  <path d="M 10,90 
           C 80,68 140,78 180,88 
           C 220,98 260,78 300,75" 
        fill="none" 
        stroke="#0d9488" 
        stroke-width="4" 
        stroke-linecap="round"/>
  
  <!-- Garis bawah utama - bold dan dinamis -->
  <!-- Melengkung naik kemudian turun tajam ke kanan -->
  <path d="M 5,145 
           C 100,125 170,140 210,150
           L 260,95 
           L 305,70" 
        fill="none" 
        stroke="url(#blueGrad)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>
